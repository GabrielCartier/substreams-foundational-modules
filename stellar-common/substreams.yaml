specVersion: v0.1.0
package:
  url: https://github.com/streamingfast/substreams-foundational-modules/stellar-common
  description: "Foundational module for Stellar"
  image: ./stellar.png
  name: stellar_foundational
  version: v0.3.0

protobuf:
  files:
    - types.proto
  importPaths:
    - ./proto/sf/substreams/stellar/type/v1
  descriptorSets:
    - localPath: ./descriptors/firehose-stellar.binpb
  excludePaths:
    - google
    - sf/substreams/
    - sf/firehose/

imports:
  stellar: https://github.com/streamingfast/substreams-stellar/releases/download/v0.1.3/stellar-v0.1.3.spkg

binaries:
  default:
    type: wasm/rust-v1
    file: ../target/wasm32-unknown-unknown/release/stellar_common.wasm

network: stellar-mainnet

modules:
  - name: map_transactions
    kind: map
    inputs:
      - source: sf.stellar.type.v1.Block
    output:
      type: proto:sf.substreams.stellar.type.v1.Transactions

  - name: index_transactions
    kind: blockIndex
    inputs:
      - map: map_transactions
    output:
      type: proto:sf.substreams.index.v1.Keys

  - name: filtered_transactions
    kind: map
    inputs:
      - params: string
      - map: map_transactions
    blockFilter:
      module: index_transactions
      query:
        params: true
    output:
      type: proto:sf.substreams.stellar.type.v1.Transactions

  - name: map_operations
    kind: map
    inputs:
      - map: map_transactions
    output:
      type: proto:sf.substreams.stellar.type.v1.Operations

  - name: index_operations
    kind: blockIndex
    inputs:
      - map: map_operations
    output:
      type: proto:sf.substreams.index.v1.Keys
  
  - name: filtered_operations
    kind: map
    inputs:
      - params: string
      - map: map_operations
    blockFilter:
      module: index_operations
      query:
        params: true
    output:
      type: proto:sf.substreams.stellar.type.v1.Operations

params:
  filtered_operations: operation:liquidity_pool_deposit || operation:create_account
  filtered_transactions: source_account:GBTLMZIRRAYXQNT6AXGU7XVTWIOE7NES2AG2CGTPJPWRZMUWHEYAGFSC


