specVersion: v0.1.0
package:
  url: https://github.com/streamingfast/substreams-foundational-modules/stellar-common
  description: "Foundational module for Stellar"
  image: ./stellar.png
  name: stellar_foundational
  version: v0.1.0

protobuf:
  files:
    - types.proto
  importPaths:
    - ./proto/sf/substreams/stellar/type/v1
  descriptorSets:
    - module: buf.build/streamingfast/firehose-stellar
  excludePaths:
    - google
    - sf/substreams/
    - sf/firehose/

imports:
  stellar: https://github.com/streamingfast/substreams-stellar/releases/download/v0.1.3/stellar-v0.1.3.spkg

binaries:
  default:
    type: wasm/rust-v1
    file: ./target/wasm32-unknown-unknown/release/substreams.wasm

network: stellar

modules:
  - name: map_created_accounts
    kind: map
    initialBlock: 761000
    inputs:
      - source: sf.stellar.type.v1.Block
    output:
      type: proto:sf.substreams.stellar.type.v1.Accounts

  - name: map_payments
    kind: map
    initialBlock: 761000
    inputs:
      - source: sf.stellar.type.v1.Block
    output:
      type: proto:sf.substreams.stellar.type.v1.Payments

  - name: index_payments
    kind: blockIndex
    inputs:
      - map: map_payments
    output:
      type: proto:sf.substreams.index.v1.Keys

  - name: filtered_payments
    kind: map
    inputs:
      - params: string
      - map: map_payments
    blockFilter:
      module: index_payments
      query:
        params: true
    output:
      type: proto:sf.substreams.stellar.type.v1.Payments
params: # Default parameters for the filtered modules. You can override these parameters based on your needs.
  filtered_payments: "account:GCW2NGRNWISFIXSGCBXPU23GDBAMHIOQOWO52LZWEWNELRC4XDQMDWNT"
